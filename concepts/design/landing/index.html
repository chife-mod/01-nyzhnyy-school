<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Школа Нижнього — лендинг (екран 1 + 2)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#fff;width:100%;overflow-x:hidden;}
/* ЄДИНИЙ відступ скрізь = внутрішньому шву сцени (8px при базі 1440).
   T = 100vw/182 → це РІВНО 8px × масштаб сцени, тож боки, верх, низ і
   проміжок між екранами однакові й збігаються зі швами всередині макета. */
.deck{--T:calc(100vw / 182);padding:var(--T);display:flex;flex-direction:column;gap:var(--T);}
/* кожен екран = сцена 1440×800; ширина по доступному, висота за пропорцією → 0 letterbox всередині */
.frame{width:100%;aspect-ratio:1440 / 800;border:0;display:block;background:#fff;}
</style>
</head>
<body>
  <div class="deck">
    <iframe class="frame" src="../?v=2" title="Екран 1 — головний" loading="eager"></iframe>
    <iframe class="frame" src="../screen-2/?v=2" title="Екран 2 — One Vision" loading="eager"></iframe>
  </div>
</body>
</html>
