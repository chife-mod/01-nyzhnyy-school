<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Школа Нижнього — лендинг (екран 1 + 2)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-snap-type:y proximity;scroll-behavior:smooth;}
html,body{background:#fff;width:100%;overflow-x:hidden;}           /* білий фон полів → стик екранів суцільно білий, без чорної смуги; width:100% (не 100vw) — без горизонт. скролу */
/* кожна секція = повний вʼюпорт; екран вписується (fit) з білими полями зверху і знизу */
.section{position:relative;width:100%;height:100vh;scroll-snap-align:start;}
.section iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:block;}
</style>
</head>
<body>
  <div class="section"><iframe src="../" title="Екран 1 — головний" loading="eager"></iframe></div>
  <div class="section"><iframe src="../screen-2/" title="Екран 2 — One Vision" loading="eager"></iframe></div>
</body>
</html>
