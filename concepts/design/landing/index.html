<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Школа Нижнього — лендинг (екран 1 + 2)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#fff;width:100%;overflow-x:hidden;}
/* Рамка і проміжки — РІВНО 8px скрізь (фікс, як у референсі joindawn.com):
   8px зверху / знизу / боки + 8px між екранами. Перший екран = на всю висоту (100vh − рамка). */
.deck{display:flex;flex-direction:column;gap:8px;padding:8px;}
.frame{width:100%;height:calc(100vh - 16px);border:0;display:block;background:#fff;}
</style>
</head>
<body>
  <div class="deck">
    <iframe class="frame" src="../?v=6" title="Екран 1 — головний" loading="eager"></iframe>
    <iframe class="frame" src="../screen-2/?v=6" title="Екран 2 — One Vision" loading="eager"></iframe>
  </div>
</body>
</html>
