<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Школа Нижнього — лендинг (екран 1 + 2)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
/* кожен екран вписується ЦІЛКОМ у вʼюпорт (нічого не обрізається, завжди влазить).
   mandatory-snap → другий екран так само стає на весь екран; фон білий скрізь. */
html{scroll-snap-type:y mandatory;scroll-behavior:smooth;}
html,body{background:#fff;width:100%;overflow-x:hidden;}
.section{position:relative;width:100%;height:100vh;scroll-snap-align:start;scroll-snap-stop:always;}
.section iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:block;background:#fff;}
</style>
</head>
<body>
  <div class="section"><iframe src="../?v=11" title="Екран 1 — головний" loading="eager"></iframe></div>
  <div class="section"><iframe src="../screen-2/?v=11" title="Екран 2 — One Vision" loading="eager"></iframe></div>
</body>
</html>
