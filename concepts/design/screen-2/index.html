<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Школа Нижнього — екран 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{ --s:1; --sans:'Euclid Circular A','Inter',system-ui,-apple-system,sans-serif; --purple:#895FCF; }  /* стрілка ховера — точний фіолет з Figma */
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:#0a0a0a;font-family:var(--sans);overflow:hidden;display:flex;align-items:center;justify-content:center;}

/* фікс-сцена 1440×800, масштаб під вʼюпорт (як на екрані 1) */
.stage{width:1440px;height:800px;position:relative;transform:scale(var(--s));transform-origin:center center;background:#fff;overflow:hidden;flex:0 0 auto;}

/* ── фото-потік знизу вгору. z 5/20: і ПІД, і НАД текстом (вперемішку); кнопка(30) завжди зверху ── */
.photo{position:absolute;left:0;top:0;overflow:hidden;opacity:0;pointer-events:none;will-change:transform,opacity;transform-origin:center center;}
.photo img{width:100%;height:100%;object-fit:cover;display:block;}

/* ── текст: fade; усі z=10 (фото йдуть і за, і перед — вперемішку), кнопка вище (30) ── */
.txt{position:absolute;color:#000;opacity:0;transition:opacity 1s ease;}
.stage.ready .txt{opacity:1;}
.t-one{left:283px;top:168px;z-index:10;font-weight:500;font-size:88px;line-height:.9;letter-spacing:-3.52px;white-space:nowrap;}
.col{left:720px;top:249px;width:414px;display:flex;flex-direction:column;gap:32px;transition-delay:.12s;}
.t-multi{position:relative;z-index:10;font-weight:500;font-size:88px;line-height:.9;letter-spacing:-3.52px;}
.sub{position:relative;z-index:10;font-weight:400;font-size:18px;line-height:1.4;}
.cta{position:relative;z-index:30;display:flex;align-items:center;cursor:pointer;}                                                 /* кнопка — завжди зверху, інтерактивна */
.pill{background:#000;color:#fff;border-radius:100px;padding:12px 24px;font-weight:400;font-size:14px;line-height:1.4;white-space:nowrap;flex:0 0 auto;}
/* кола впритул до пілюлі (без відступу). На ховері праве схлопується в 0, ліве росте з 0 → виштовхує пілюлю вправо */
.circ{flex:0 0 auto;height:44px;display:flex;align-items:center;overflow:hidden;transition:width .55s cubic-bezier(.7,0,.2,1);}
.circ-l{width:0;justify-content:flex-start;}
.circ-r{width:44px;justify-content:flex-end;}
.circ-b{width:44px;height:44px;flex:0 0 auto;background:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .55s cubic-bezier(.7,0,.2,1);}
.circ-l .circ-b{transform:scale(0);}   /* center-origin: стрілка не зміщується; overflow:hidden обрізає вихід на пілюлю */
.circ-r .circ-b{transform:scale(1);}
.circ-l .circ-b svg{stroke:var(--purple);}     /* ліва стрілка — фіолетова */
.cta:hover .circ-l{width:44px;}
.cta:hover .circ-r{width:0;}
.cta:hover .circ-l .circ-b{transform:scale(1);}
.cta:hover .circ-r .circ-b{transform:scale(0);}
.circ-b svg{width:24px;height:24px;display:block;}
</style>
</head>
<body>

<div class="stage" id="stage">
  <!-- фото-потік створюється в JS -->

  <!-- текст -->
  <div class="txt t-one">One Vision.</div>
  <div class="txt col">
    <div class="t-multi">Multiple<br>Directions.</div>
    <div class="sub">Education, diplomacy, public governance, business and community initiatives connected by a shared mission.</div>
    <div class="cta">
      <span class="circ circ-l"><span class="circ-b"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg></span></span>
      <div class="pill">Explore the Ecosystem</div>
      <span class="circ circ-r"><span class="circ-b"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg></span></span>
    </div>
  </div>
</div>

<script>
/* масштаб сцени під вʼюпорт */
function fit(){ document.documentElement.style.setProperty('--s', Math.min(innerWidth/1440, innerHeight/800)); }
fit(); addEventListener('resize', fit);

const stage = document.getElementById('stage');

/* пул фото (формат обираємо нижче: AVIF → WebP → JPG) */
const N = 20;
let FMT = 'jpg';
function buildPool(){ return Array.from({length:N}, (_,i)=> `../assets/photos/photo-${String(i+1).padStart(2,'0')}.${FMT}`); }
let POOL = buildPool();
/* без дублів на екрані одночасно: виключаємо фото, що зараз показані іншими */
function nextPhoto(used){
  const avail = POOL.filter(s=>!used.has(s));
  const pool = avail.length ? avail : POOL;
  return pool[(Math.random()*pool.length)|0];
}

/* ── ПОТІК знизу вгору: фото пливуть угору одним потоком, крупніші знизу /
      дрібніші вгорі, частина за текстом (z5), частина перед (z20) ── */
const stream = [];
const OVERLAP = 0.30;                                               // макс. перекриття двох фото
function scaleAt(y){ return 0.46 + 0.54*Math.max(0, Math.min(1, y/800)); }   // менше вгорі
function reset(p, initial){
  const used = new Set();
  for(const q of stream){ if(q!==p && q.src) used.add(q.src); }     // зайняті іншими
  if(p.src) used.add(p.src);                                        // + не повторювати себе одразу
  p.src = nextPhoto(used);
  p.img.src = p.src;
  p.base = 120 + Math.random()*72;                                  // 120–192
  p.y = initial ? (Math.random()*960 - 80) : (820 + Math.random()*340);
  p.speed = 46 + Math.random()*30;                                  // px/с угору
  // x: з 10 спроб беремо найдальшу від інших → менше клумпінгу (push-apart майже не треба)
  let bestX = 16 + Math.random()*(1440-32-p.base), best = -1;
  for(let t=0;t<10;t++){
    const cx = 16 + Math.random()*(1440-32-p.base);
    let mind = 1e9;
    for(const q of stream){ if(q!==p){ const d=Math.abs((cx+p.base/2)-(q.x+q.base/2)); if(d<mind) mind=d; } }
    if(mind > best){ best = mind; bestX = cx; }
  }
  p.x = bestX;
  p.el.style.width = p.base+'px'; p.el.style.height = p.base+'px';
  p.el.style.zIndex = Math.random()<0.5 ? 5 : 20;                   // і за(5), і перед(20) текстом — вперемішку
}
function makePhoto(initial){
  const el=document.createElement('div'); el.className='photo';
  const img=document.createElement('img'); el.appendChild(img); stage.appendChild(el);
  const p={el,img}; reset(p, initial); stream.push(p);
}
function place(p){
  const sc = scaleAt(p.y);
  let op = 1;
  if(p.y > 730) op = Math.max(0, (800 - p.y)/70);                   // проявлення знизу
  else if(p.y < 80) op = Math.max(0, (p.y + p.base*sc)/(80 + p.base*sc)); // згасання вгорі
  p.el.style.transform = `translate(${p.x}px,${p.y}px) scale(${sc})`;
  p.el.style.opacity = op;
}
/* Push Apart: розштовхуємо фото по X, щоб перекриття двох було ≤30% (без потрійних стопок) */
function separate(strength, maxShift){
  for(let a=0;a<stream.length;a++) for(let b=a+1;b<stream.length;b++){
    const A=stream[a], B=stream[b];
    const aS=A.base*scaleAt(A.y), bS=B.base*scaleAt(B.y), half=(aS+bS)/2;
    const acx=A.x+A.base/2, bcx=B.x+B.base/2;
    const ox=half-Math.abs(acx-bcx);
    const oy=half-Math.abs((A.y+A.base/2)-(B.y+B.base/2));
    const allowed=OVERLAP*Math.min(aS,bS);
    if(ox>0 && oy>0 && Math.min(ox,oy)>allowed){
      let shift=(ox-allowed)*0.5*strength;
      if(shift>maxShift) shift=maxShift;                            // кеп → плавне розведення, без «тику»
      const dir=(acx<=bcx)?1:-1;
      A.x-=dir*shift; B.x+=dir*shift;
    }
  }
  for(const p of stream) p.x=Math.max(8, Math.min(1440-8-p.base, p.x));
}
function tick(dt){
  for(const p of stream){ p.y -= p.speed*dt; if(p.y < -p.base) reset(p); }
  separate(0.5, 1); separate(0.5, 1);                              // макс 1px/виклик → плавно, без ривків
  for(const p of stream) place(p);
}
let last=0;
function loop(){ const now=performance.now(); const dt = last ? Math.min(0.05,(now-last)/1000) : 0; last=now; tick(dt); }

/* детекція формату, потім запуск потоку */
const AVIF_TEST="data:image/avif;base64,AAAAIGZ0eXBhdmlmAAAAAGF2aWZtaWYxbWlhZk1BMUEAAADrbWV0YQAAAAAAAAAhaGRscgAAAAAAAAAAcGljdAAAAAAAAAAAAAAAAAAAAAAOcGl0bQAAAAAAAQAAAB5pbG9jAAAAAEQAAAEAAQAAAAEAAAETAAAAHQAAAChpaW5mAAAAAAABAAAAGmluZmUCAAAAAAEAAGF2MDFDb2xvcgAAAABqaXBycAAAAEtpcGNvAAAAFGlzcGUAAAAAAAAAAgAAAAIAAAAQcGl4aQAAAAADCAgIAAAADGF2MUOBIAAAAAAAE2NvbHJuY2x4AAEADQAGgAAAABdpcG1hAAAAAAAAAAEAAQQBAoMEAAAAJW1kYXQSAAoHOAA2kBDQaTIQGUJjBMPPPPNBIACQQRHSgA==";
const WEBP_TEST="data:image/webp;base64,UklGRhoAAABXRUJQVlA4TA0AAAAvAAAAEAcQERGIiP4HAA==";
function canDecode(uri){ return new Promise(r=>{ const im=new Image(); im.onload=()=>r(im.width>0); im.onerror=()=>r(false); im.src=uri; }); }
(async()=>{
  if(await canDecode(AVIF_TEST)) FMT='avif';
  else if(await canDecode(WEBP_TEST)) FMT='webp';
  POOL = buildPool();
  for(let i=0;i<9;i++) makePhoto(true);                             // 9 фото — потік
  for(let i=0;i<30;i++) separate(1, 9999);                          // розвести стартові позиції (без кепу — до відмальовки)
  stream.forEach(place);                                            // перший кадр
  last = performance.now(); setInterval(loop, 16);                  // ~60fps, dt-based (рівна швидкість)
})();

/* текст проявляється першим (shun-shun), потім пливуть фото */
setTimeout(()=> stage.classList.add('ready'), 80);
</script>
</body>
</html>
